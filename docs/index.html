<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, 
                                   initial-scale=1.0" />
    <title>ᓚᘏᗢ HANGMAN TIME ᓚᘏᗢ</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    </head>
     <body>
  
    <div class="game-modal" id="over">
      <div class="content">
        <h4>WOAH!</h4>
        <p>The correct word was: <b>rainbow</b></p>
        <button class="play-again">Play Again</button>
      </div>
    </div>

   <div class="container">
    <div class="hangman-box">
        <canvas width="200" height="250"></canvas>
        <h1>Hangman Game</h1>
        <div class="timer">Time left:
            <span id="timer-display">3:00</span>
        </div>
    </div>

    <div class="game-box">
        <div class="category-box">
            <h2>Choose a category!</h2>
            <div class="category-option">
                <button onclick="getRandomWord('codingQuiz')">•⩊•</button>
                <p>coding</p>
            </div>
            <div class="category-option">
                <button onclick="getRandomWord('sillyQuiz')">≥(•ω•)≤</button>
                <p>silly lingo</p>
            </div>
            <div class="category-option">
                <button onclick="getRandomWord()">ʕ•ᴥ•ʔ</button>
                <p>random</p>
            </div>
        </div>
        <ul class="word-display"></ul>
        <h4 class="hint-text">Hint: <b></b></h4>
        <h4 class="guesses-text">Incorrect guesses: <b>0 / 6</b></h4>
        <div class="keyboard"></div>
    </div>
</div>
  </body>
</html>
